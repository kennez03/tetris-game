<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="俄罗斯方块" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>俄罗斯方块</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="start-screen" class="screen">
        <h1>俄罗斯方块</h1>
        <button class="btn-primary" id="btn-start">开始游戏</button>
        <div class="high-score">最高分: <span id="high-score-display">0</span></div>
      </div>
      <div id="game-over-screen" class="screen hidden">
        <h1>游戏结束</h1>
        <div class="final-score">
          <div>得分: <span id="final-score">0</span></div>
          <div>最高分: <span id="final-high-score">0</span></div>
        </div>
        <button class="btn-primary" id="btn-restart">再来一局</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
